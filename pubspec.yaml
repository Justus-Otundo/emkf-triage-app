name: emkf_triage_app
description: "Paramedic Triage Intake Application — EMKF Technical Assessment"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0

  # Dependency injection
  get_it: ^8.0.3

  # Value equality
  equatable: ^2.0.7

  # Local persistence (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
